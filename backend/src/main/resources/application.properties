# ====== APP ======
server.port=8081
spring.application.name=bombonera-pos

# ====== DATASOURCE ======
spring.datasource.url=jdbc:postgresql://localhost:5432/bombonera
spring.datasource.username=postgres
spring.datasource.password=6509
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ====== JPA / Hibernate ======
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ====== JWT ======
app.jwt.secret=tFQK9uEtX2lQ4dR/p8vQveOWQT4zVnICB0PMtwCV+Ig=
app.jwt.expiration=86400000

# ====== Jackson (v3) — dates as ISO strings by default ======

# ====== Logging ======
logging.level.com.bombonera=DEBUG
