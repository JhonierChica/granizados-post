# ====== APP ======
server.port=8080
spring.application.name=bombonera-pos

# ====== DATASOURCE (ajustar según tu DB) ======
spring.datasource.url=jdbc:postgresql://localhost:5432/bombonera
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ====== HikariCP ======
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ====== JPA / Hibernate ======
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ====== JWT ======
jwt.secret=bombonera-secret-key-change-in-production-2026
jwt.expiration=86400000

# ====== Logging ======
logging.level.com.bombonera=DEBUG
