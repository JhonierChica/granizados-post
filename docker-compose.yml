version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bombonera-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bombonera}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bombonera123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/import.sql:/docker-entrypoint-initdb.d/import.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bombonera}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bombonera-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bombonera-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bombonera}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bombonera123}
      APP_JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-bombonera}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bombonera123}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bombonera-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bombonera-frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - bombonera-net

volumes:
  postgres_data:

networks:
  bombonera-net:
    driver: bridge
